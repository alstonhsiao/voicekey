name: WhisperVoice
options:
  bundleIdPrefix: com.alston
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  WhisperVoice:
    type: application
    platform: macOS
    sources:
      - path: WhisperVoice
    dependencies:
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_NAME: WhisperVoice
        PRODUCT_BUNDLE_IDENTIFIER: com.alston.WhisperVoice
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: WhisperVoice/Info.plist
        CODE_SIGN_ENTITLEMENTS: WhisperVoice/WhisperVoice.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_TESTABILITY: YES
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"

  WhisperVoiceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: WhisperVoiceTests
    dependencies:
      - target: WhisperVoice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alston.WhisperVoiceTests
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "13.0"

schemes:
  WhisperVoice:
    build:
      targets:
        WhisperVoice: all
        WhisperVoiceTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WhisperVoiceTests
    archive:
      config: Release
