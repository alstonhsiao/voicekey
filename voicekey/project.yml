name: VoiceKey
options:
  bundleIdPrefix: com.alston
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Manual
    # 穩定 self-signed 憑證（見 setup-signing-cert.sh）。用固定 identity 簽，
    # 避免 ad-hoc 每次 rebuild 換 cdhash 導致「輔助使用」授權失效。
    # 若尚未建立憑證，先跑 bash setup-signing-cert.sh，或暫時改回 "-" 用 ad-hoc。
    CODE_SIGN_IDENTITY: "VoiceKey Self-Signed"
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  VoiceKey:
    type: application
    platform: macOS
    sources:
      - path: VoiceKey
    dependencies:
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_NAME: VoiceKey
        PRODUCT_BUNDLE_IDENTIFIER: com.alston.VoiceKey
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: VoiceKey/Info.plist
        CODE_SIGN_ENTITLEMENTS: VoiceKey/VoiceKey.entitlements
        GENERATE_INFOPLIST_FILE: NO
        # 自用、不 notarize，關閉 hardened runtime：self-signed 憑證（TeamID not set）
        # 搭配 hardened runtime 會讓 dyld 以 Team ID 不符為由拒載入 dylib。
        ENABLE_HARDENED_RUNTIME: NO
        # 關閉 Xcode 16 的 debug dylib 拆分：否則主程式與 .debug.dylib 在 self-signed
        # 簽章下 Team ID 比對失敗，啟動即 "Library not loaded" crash。
        ENABLE_DEBUG_DYLIB: NO
        ENABLE_TESTABILITY: YES
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"

  VoiceKeyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: VoiceKeyTests
    dependencies:
      - target: VoiceKey
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alston.VoiceKeyTests
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "13.0"

schemes:
  VoiceKey:
    build:
      targets:
        VoiceKey: all
        VoiceKeyTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VoiceKeyTests
    archive:
      config: Release
